steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/sayyes-485207/cloud-run-source-deploy/solohub:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - europe-west1-docker.pkg.dev/sayyes-485207/cloud-run-source-deploy/solohub:latest

  # Extract fresh staticfiles from the built image before Firebase deploy
  - name: europe-west1-docker.pkg.dev/sayyes-485207/cloud-run-source-deploy/solohub:latest
    id: extract-static
    waitFor: [push]
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p /workspace/staticfiles
        cp -r /app/staticfiles/. /workspace/staticfiles/
    env:
      - DJANGO_SECRET_KEY=build-placeholder
      - DEBUG=False

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - solohub
      - --image=europe-west1-docker.pkg.dev/sayyes-485207/cloud-run-source-deploy/solohub:latest
      - --region=europe-west1
      - --platform=managed
      - --no-allow-unauthenticated
      - --service-account=1082894585721-compute@developer.gserviceaccount.com
      - --set-secrets=DJANGO_SECRET_KEY=solohub-secret-key:latest,DATABASE_URL=solohub-db-url:latest
      - --set-env-vars=DEBUG=False
      - --memory=512Mi
      - --cpu=1
      - --project=sayyes-485207

  # Deploy Firebase Hosting — serves staticfiles via CDN and proxies API to Cloud Run
  - name: node:18
    id: deploy-firebase
    waitFor: [extract-static, deploy]
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project sayyes-485207 --non-interactive --token $$FIREBASE_TOKEN
    secretEnv: [FIREBASE_TOKEN]

images:
  - europe-west1-docker.pkg.dev/sayyes-485207/cloud-run-source-deploy/solohub:latest

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/sayyes-485207/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN
