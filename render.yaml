services:
  - type: web
    name: solohub
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt        # closest to europe-west1 / Supabase EU
    plan: free               # change to 'starter' ($7/mo) for always-on
    healthCheckPath: /       # Django returns {"status":"ok"} here
    autoDeploy: true         # auto-deploy on every git push to main

    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true    # Render generates and stores a secure secret
      - key: DATABASE_URL
        sync: false            # you paste this in the Render dashboard
      - key: SUPABASE_URL
        value: https://rsuqwzuazrmnvvdcilrf.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false            # paste in dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false            # paste in dashboard
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false            # optional, paste in dashboard if needed
