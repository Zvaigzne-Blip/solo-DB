databases:
  - name: solohub-db
    databaseName: solohub
    user: solohub
    plan: free               # 256 MB RAM, 1 GB storage — free forever on Render

services:
  - type: web
    name: solohub
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt        # EU Central
    plan: free               # change to 'starter' ($7/mo) for always-on
    healthCheckPath: /       # Django returns {"status":"ok"} here
    autoDeploy: true         # auto-deploy on every git push to main

    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true    # Render generates and stores a secure random secret
      - key: DATABASE_URL
        fromDatabase:
          name: solohub-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PORT
        value: "8080"
